name: NSE Momentum Scanner

on:
  schedule:
     - cron: '*/15 * * * *'   # Every 15 minutes (minimum reliable interval)
#    - cron: '10 14 * * *'  # 7:40 PM IST
  workflow_dispatch:

# Add write permissions
permissions:
  contents: write
  actions: read


jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pandas requests numpy
    
    - name: Clean Previous Data
      run: python scripts/clean_folders.py
    
    - name: Download Nifty 200 List
      run: python scripts/download_nifty200.py
    
    - name: Download Bhavcopy
      run: python scripts/download_bhavcopy.py
    
    - name: Download Volatility Report
      run: python scripts/download_volatility.py
    
    - name: Filter Nifty 200 Stocks
      run: python scripts/filter_nifty200.py
    
    - name: Calculate Momentum Score
      run: python scripts/calculate_momentum.py
    
    - name: Generate Final Report
      run: python scripts/generate_report.py
    
    - name: Send to Telegram
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scripts/send_telegram.py
    
    - name: Upload Watchlist Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nse-watchlist
        path: output/
        retention-days: 7
