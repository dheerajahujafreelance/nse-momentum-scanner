name: NSE Momentum Scanner

on:
  schedule:
    # Runs at 7:40 PM IST daily = 14:10 UTC
    - cron: '10 14 * * *'
  workflow_dispatch:

# Add write permissions
permissions:
  contents: write
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pandas requests numpy
    
    - name: Download Bhavcopy
      run: python scripts/download_bhavcopy.py
    
    - name: Download Volatility Report
      run: python scripts/download_volatility.py
    
    - name: Filter Equity Only
      run: python scripts/filter_equity.py
    
    - name: Calculate Momentum Score
      run: python scripts/calculate_momentum.py
    
    - name: Generate Final Report
      run: python scripts/generate_report.py
    
    - name: Commit Results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "github-actions"
        git add data/ output/
        git diff --staged --quiet || git commit -m "Daily scan: $(date '+%Y-%m-%d')"
        git push
